<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우시개발팀 생일 알림이 (无锡开发团队) 🎂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-blue-50 min-h-screen p-4 font-sans pb-24 text-gray-800">

    <div class="max-w-md mx-auto shadow-2xl rounded-3xl bg-white overflow-hidden border-4 border-white mb-20">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white p-8 text-center">
            <h1 class="text-2xl font-black mb-1 tracking-tight">우시개발팀 생일 🎂</h1>
            <h2 class="text-xs font-bold text-blue-100 opacity-80 uppercase tracking-widest">Wuxi Dev Team Birthdays
            </h2>
            <p
                class="text-[10px] mt-4 bg-white/20 inline-block px-3 py-1 rounded-full uppercase tracking-tighter font-bold">
                Project: cnation-birthday-manager</p>
        </div>

        <div class="p-5 space-y-4" id="birthdayList">
            <div class="text-center py-12 text-gray-400 italic animate-pulse">데이터를 동기화 중입니다...</div>
        </div>

        <div class="p-6 bg-gray-50 border-t border-gray-100">
            <h3 class="text-sm font-black text-gray-500 mb-4 uppercase tracking-wider">새 멤버 추가 (添加新成员)</h3>
            <div class="flex flex-col space-y-3">
                <input type="text" id="nameInput" placeholder="이름 (姓名) 예: Edward"
                    class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:outline-none focus:border-blue-400 text-sm shadow-sm transition-all">

                <div class="flex space-x-2">
                    <input type="date" id="dateInput"
                        class="flex-1 px-4 py-3 border-2 border-gray-100 rounded-xl focus:outline-none focus:border-blue-400 text-sm shadow-sm transition-all text-gray-600">
                    <label
                        class="flex items-center space-x-2 text-xs font-black text-gray-500 bg-white border-2 border-gray-100 px-4 py-2 rounded-xl cursor-pointer shadow-sm active:bg-gray-100 transition-all">
                        <input type="checkbox" id="isLunar" class="w-4 h-4 text-blue-600 rounded focus:ring-0">
                        <span>음력(农历)</span>
                    </label>
                </div>

                <button id="addBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition-all shadow-lg active:scale-95 text-sm uppercase tracking-widest">
                    멤버 등록 (등록/添加) ➕
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. Supabase 설정 정보
        const SUPABASE_URL = 'https://nydnthkqvpajufbycxjq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_LWqTdLhSkspLke1HvFsmVA_KOYnGGaY';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const tableName = 'cnation_birthdays';

        // 2. 고정 멤버 데이터 (구조 통일: date -> birth_date, isLunar -> is_lunar)
        const defaultMembers = [
            { id: 'local_1', name: "Edward(문명국)", birth_date: "1975-08-12", is_lunar: false },
            { id: 'local_2', name: "Theo(김태욱)", birth_date: "1985-02-12", is_lunar: false },
            { id: 'local_3', name: "Aiden(이경한)", birth_date: "1982-07-02", is_lunar: false },
            { id: 'local_4', name: "Jeffers(黄竞)", birth_date: "1992-10-28", is_lunar: false },
            { id: 'local_5', name: "Diviner(刘珠珠)", birth_date: "1990-07-13", is_lunar: true },
            { id: 'local_6', name: "Thorin(封猛)", birth_date: "1989-03-28", is_lunar: false },
            { id: 'local_7', name: "Steven(张佳炜)", birth_date: "1997-01-02", is_lunar: false },
            { id: 'local_8', name: "Dragon(정용선)", birth_date: "1983-02-02", is_lunar: false },
            { id: 'local_9', name: "Tim(이태선)", birth_date: "1993-10-18", is_lunar: false },
            { id: 'local_10', name: "Damon(김수민)", birth_date: "1993-02-18", is_lunar: false },
            { id: 'local_11', name: "Cassiel(刘珊珊)", birth_date: "1989-01-16", is_lunar: false },
            { id: 'local_12', name: "Shirley(江丽萍)", birth_date: "1985-12-27", is_lunar: false },
            { id: 'local_13', name: "Anakin(강경두)", birth_date: "1973-08-06", is_lunar: false },
            { id: 'local_14', name: "William(박원경)", birth_date: "1979-05-29", is_lunar: false },
            { id: 'local_15', name: "Seabetty(张玉芹)", birth_date: "1979-12-24", is_lunar: false },
            { id: 'local_16', name: "Hagen(陈冠龙)", birth_date: "1985-02-23", is_lunar: false },
            { id: 'local_17', name: "Echo(杨玉盈)", birth_date: "1997-04-06", is_lunar: false },
            { id: 'local_18', name: "Mason(孟岩)", birth_date: "1999-03-25", is_lunar: true }
        ];

        // 3. 생일 계산 로직
        function getInfo(birthStr, isLunar) {
            if (!birthStr) return { diff: 999, masked: 'N/A', display: 'N/A' };
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const [y, m, d] = birthStr.split('-').map(Number);
            const curY = today.getFullYear();

            let targetSolar;
            if (isLunar) {
                try {
                    const l = Lunar.fromYmd(curY, m, d);
                    const s = l.getSolar();
                    targetSolar = new Date(s.getYear(), s.getMonth() - 1, s.getDay());
                } catch (e) { targetSolar = new Date(curY, m - 1, d); }
            } else {
                targetSolar = new Date(curY, m - 1, d);
            }

            if (targetSolar < today) {
                if (isLunar) {
                    const l = Lunar.fromYmd(curY + 1, m, d);
                    const s = l.getSolar();
                    targetSolar = new Date(s.getYear(), s.getMonth() - 1, s.getDay());
                } else {
                    targetSolar = new Date(curY + 1, m - 1, d);
                }
            }

            const diff = Math.ceil((targetSolar - today) / 86400000);
            return {
                diff,
                masked: `OOOO-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`,
                display: `${targetSolar.getMonth() + 1}월 ${targetSolar.getDate()}일`
            };
        }

        // 4. 데이터 통합 및 렌더링 함수
        async function fetchAndRender() {
            const list = document.getElementById('birthdayList');

            // Supabase에서 추가 데이터 로드
            const { data: dbMembers, error } = await _supabase.from(tableName).select('*');
            if (error) console.error("DB 로드 실패:", error);

            // 로컬 데이터와 클라우드 데이터 합치기
            const allMembers = [...defaultMembers, ...(dbMembers || [])];

            const processed = allMembers.map(m => ({
                ...m,
                info: getInfo(m.birth_date, m.is_lunar)
            }));

            // D-Day 순으로 정렬
            processed.sort((a, b) => a.info.diff - b.info.diff);

            list.innerHTML = processed.map(m => {
                const isToday = m.info.diff === 0;
                const isLocal = String(m.id).startsWith('local_');
                return `
                <div class="flex items-center justify-between p-4 rounded-2xl border-2 ${isToday ? 'border-red-400 bg-red-50 ring-4 ring-red-100' : 'border-gray-100 bg-white'} shadow-sm transition-all hover:shadow-md">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="font-black text-gray-800 text-lg">${m.name}</span>
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded-full ${m.is_lunar ? 'bg-indigo-100 text-indigo-600' : 'bg-gray-100 text-gray-500'}">
                                ${m.is_lunar ? '음력' : '양력'}
                            </span>
                        </div>
                        <p class="text-[10px] font-medium text-gray-400 mt-1 uppercase">B-DAY: ${m.info.masked} / ${m.info.display}</p>
                    </div>
                    <div class="text-right flex flex-col items-end gap-2">
                        <span class="text-xl font-black ${isToday ? 'text-red-500 animate-bounce' : 'text-blue-600'}">
                            ${isToday ? 'D-Day 🎂' : 'D-' + m.info.diff}
                        </span>
                        ${!isLocal ? `<button onclick="deleteMember('${m.id}')" class="text-[10px] text-gray-300 hover:text-red-500 font-bold underline decoration-dotted transition-colors">삭제 (删除)</button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        // 5. 전역 등록/삭제 함수
        window.addMember = async () => {
            const name = document.getElementById('nameInput').value;
            const birth_date = document.getElementById('dateInput').value;
            const is_lunar = document.getElementById('isLunar').checked;

            if (!name || !birth_date) return alert('정보를 입력해주세요! (请填写姓名和日期)');

            const { error } = await _supabase.from(tableName).insert([{ name, birth_date, is_lunar }]);
            if (error) {
                alert('저장 실패: ' + error.message);
            } else {
                document.getElementById('nameInput').value = '';
                document.getElementById('dateInput').value = '';
                document.getElementById('isLunar').checked = false;
                fetchAndRender();
            }
        };

        window.deleteMember = async (id) => {
            if (!confirm('정말 삭제하시겠습니까? (确定 삭제?)')) return;
            const { error } = await _supabase.from(tableName).delete().eq('id', id);
            if (error) alert('삭제 실패: ' + error.message);
            else fetchAndRender();
        };

        // 초기 실행 이벤트
        document.getElementById('addBtn').onclick = window.addMember;
        fetchAndRender();
    </script>
</body>

</html>
