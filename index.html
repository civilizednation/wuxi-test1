<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우시개발팀 생일 알림이 (无锡开发团队) 🎂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-blue-50 min-h-screen p-4 font-sans pb-24">

    <div class="max-w-md mx-auto shadow-2xl rounded-3xl bg-white overflow-hidden border-4 border-white mb-20">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white p-8 text-center">
            <h1 class="text-2xl font-black mb-1">우시개발팀 생일 🎂</h1>
            <h2 class="text-xs font-bold text-blue-100 opacity-80 uppercase tracking-widest">Wuxi Dev Team Birthdays
            </h2>
            <p class="text-[10px] mt-4 bg-white/20 inline-block px-3 py-1 rounded-full uppercase tracking-tighter">
                Project: cnation-birthday-manager</p>
        </div>

        <div class="p-5 space-y-4" id="birthdayList">
            <div class="text-center py-10 text-gray-400 italic">데이터를 동기화 중입니다... (正在同步...)</div>
        </div>

        <div class="p-6 bg-gray-50 border-t border-gray-100">
            <h3 class="text-sm font-bold text-gray-500 mb-4">팀원 추가 (添加新成员)</h3>
            <div class="flex flex-col space-y-3">
                <input type="text" id="nameInput" placeholder="이름 (姓名) 예: Edward"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-sm">

                <div class="flex space-x-2">
                    <input type="date" id="dateInput"
                        class="flex-1 px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-sm">
                    <label
                        class="flex items-center space-x-2 text-xs font-bold text-gray-600 bg-white border border-gray-200 px-4 py-2 rounded-xl cursor-pointer shadow-sm active:bg-gray-100">
                        <input type="checkbox" id="isLunar" class="w-4 h-4 text-blue-600 rounded">
                        <span>음력(农历)</span>
                    </label>
                </div>

                <button id="addBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition-all shadow-lg active:scale-95 text-sm">
                    멤버 등록 (등록/添加) ➕
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. 제공해주신 Supabase 정보 반영
        const SUPABASE_URL = 'https://nydnthkqvpajufbycxjq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_LWqTdLhSkspLke1HvFsmVA_KOYnGGaY';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const tableName = 'cnation_birthdays'; // 테이블 이름 규칙

        // 2. 생일 계산 함수 (OOOO 마스킹 적용)
        function getInfo(birthStr, isLunar) {
            if (!birthStr) return null;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const [y, m, d] = birthStr.split('-').map(Number);
            const curY = today.getFullYear();

            let targetSolar;
            if (isLunar) {
                const l = Lunar.fromYmd(curY, m, d);
                const s = l.getSolar();
                targetSolar = new Date(s.getYear(), s.getMonth() - 1, s.getDay());
            } else {
                targetSolar = new Date(curY, m - 1, d);
            }

            if (targetSolar < today) {
                if (isLunar) {
                    const l = Lunar.fromYmd(curY + 1, m, d);
                    const s = l.getSolar();
                    targetSolar = new Date(s.getYear(), s.getMonth() - 1, s.getDay());
                } else {
                    targetSolar = new Date(curY + 1, m - 1, d);
                }
            }

            const diff = Math.ceil((targetSolar - today) / 86400000);
            return {
                diff,
                masked: `OOOO-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`,
                display: `${targetSolar.getMonth() + 1}월 ${targetSolar.getDate()}일`
            };
        }

        // 3. 실시간 데이터 불러오기
        async function fetchBirthdays() {
            const { data, error } = await _supabase
                .from(tableName)
                .select('*');

            if (error) {
                console.error('Fetch Error:', error);
                document.getElementById('birthdayList').innerHTML = `<p class="text-center text-red-400 text-xs py-10 tracking-tighter italic">데이터 로딩에 실패했습니다. 테이블 생성을 확인해주세요!</p>`;
                return;
            }

            const list = document.getElementById('birthdayList');
            if (!data || data.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 text-sm py-10 font-medium">등록된 팀원이 없습니다. 아래에서 추가해보세요! ✨</p>';
                return;
            }

            const processed = data.map(m => ({ ...m, info: getInfo(m.birth_date, m.is_lunar) }));
            processed.sort((a, b) => a.info.diff - b.info.diff);

            list.innerHTML = processed.map(m => {
                const isToday = m.info.diff === 0;
                return `
                <div class="flex items-center justify-between p-4 rounded-2xl border-2 ${isToday ? 'border-red-400 bg-red-50 ring-4 ring-red-100' : 'border-gray-100 bg-white'} shadow-sm transition-all hover:shadow-md">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="font-black text-gray-800 text-lg">${m.name}</span>
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded-full ${m.is_lunar ? 'bg-indigo-100 text-indigo-600' : 'bg-gray-100 text-gray-500'}">
                                ${m.is_lunar ? '음력' : '양력'}
                            </span>
                        </div>
                        <p class="text-[10px] font-medium text-gray-400 mt-1">생일: ${m.info.masked} / 올해: ${m.info.display}</p>
                    </div>
                    <div class="text-right flex flex-col items-end gap-2">
                        <span class="text-xl font-black ${isToday ? 'text-red-500 animate-bounce' : 'text-blue-600'}">
                            ${isToday ? 'D-Day 🎂' : 'D-' + m.info.diff}
                        </span>
                        <button onclick="deleteMember('${m.id}')" class="text-[9px] text-gray-300 hover:text-red-500 font-bold underline decoration-dotted">삭제(删除)</button>
                    </div>
                </div>
            `;
            }).join('');
        }

        // 4. 멤버 추가 로직
        async function addMember() {
            const name = document.getElementById('nameInput').value;
            const birth_date = document.getElementById('dateInput').value;
            const is_lunar = document.getElementById('isLunar').checked;

            if (!name || !birth_date) {
                alert('이름과 날짜를 모두 입력해주세요!');
                return;
            }

            const { error } = await _supabase
                .from(tableName)
                .insert([{ name, birth_date, is_lunar }]);

            if (error) {
                alert('저장 실패! 테이블 설정을 다시 확인해주세요.\n' + error.message);
            } else {
                document.getElementById('nameInput').value = '';
                document.getElementById('dateInput').value = '';
                document.getElementById('isLunar').checked = false;
                fetchBirthdays(); // 목록 갱신
            }
        }

        // 5. 삭제 로직
        window.deleteMember = async (id) => {
            if (!confirm('정말 삭제하시겠습니까? (确定 삭제?)')) return;
            const { error } = await _supabase.from(tableName).delete().eq('id', id);
            if (error) alert('삭제 실패: ' + error.message);
            else fetchBirthdays();
        };

        // 초기 실행 설정
        document.getElementById('addBtn').addEventListener('click', addMember);
        fetchBirthdays();
    </script>
</body>

</html>
