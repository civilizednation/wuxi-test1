<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우시개발팀 생일 알림이 (无锡开发团队生日) 🎂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-indigo-50 min-h-screen p-4 font-sans text-gray-800">

    <div class="max-w-md mx-auto shadow-2xl overflow-hidden rounded-3xl bg-white border-4 border-white">
        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 text-white p-8 text-center">
            <h1 class="text-2xl font-black mb-1">우시개발팀 생일 🎂</h1>
            <h2 class="text-xs font-bold text-blue-100 opacity-80 uppercase tracking-widest">Wuxi Dev Team Birthdays
            </h2>
            <p class="text-[10px] mt-4 bg-white/20 inline-block px-3 py-1 rounded-full">Project: cnation-birthday-web
            </p>
        </div>

        <div class="p-5 space-y-4" id="birthdayList">
            <div class="text-center py-10">
                <div
                    class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mb-4">
                </div>
                <p class="text-sm text-gray-400 font-medium">데이터를 불러오는 중입니다... (正在加载...)</p>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. Supabase 설정 (가입 후 받은 정보를 여기에 입력하세요!)
        const SUPABASE_URL = 'https://nydnthkqvpajufbycxjq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_LWqTdLhSkspLke1HvFsmVA_KOYnGGaY';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. 고정 팀원 데이터 (최초 1회 DB에 넣거나, 코드에서 관리)
        const teamMembers = [
            { name: "Edward(문명국)", date: "1975-08-12", isLunar: false },
            { name: "Theo(김태욱)", date: "1985-02-12", isLunar: false },
            { name: "Aiden(이경한)", date: "1982-07-02", isLunar: false },
            { name: "Jeffers(黄竞)", date: "1992-10-28", isLunar: false },
            { name: "Diviner(刘珠珠)", date: "1990-07-13", isLunar: true },
            { name: "Thorin(封猛)", date: "1989-03-28", isLunar: false },
            { name: "Steven(张佳炜)", date: "1997-01-02", isLunar: false },
            { name: "Dragon(정용선)", date: "1983-02-02", isLunar: false },
            { name: "Tim(이태선)", date: "1993-10-18", isLunar: false },
            { name: "Damon(김수민)", date: "1993-02-18", isLunar: false },
            { name: "Cassiel(刘珊珊)", date: "1989-01-16", isLunar: false },
            { name: "Shirley(江丽萍)", date: "1985-12-27", isLunar: false },
            { name: "Anakin(강경두)", date: "1973-08-06", isLunar: false },
            { name: "William(박원경)", date: "1979-05-29", isLunar: false },
            { name: "Seabetty(张玉芹)", date: "1979-12-24", isLunar: false },
            { name: "Hagen(陈冠龙)", date: "1985-02-23", isLunar: false },
            { name: "Echo(杨玉盈)", date: "1997-04-06", isLunar: false },
            { name: "Mason(孟岩)", date: "1999-03-25", isLunar: true }
        ];

        // 3. 생일 계산 로직 (익명화 포함)
        function getInfo(birthStr, isLunar) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const [y, m, d] = birthStr.split('-').map(Number);
            const curY = today.getFullYear();

            let targetSolar;
            if (isLunar) {
                const l = Lunar.fromYmd(curY, m, d);
                const s = l.getSolar();
                targetSolar = new Date(s.getYear(), s.getMonth() - 1, s.getDay());
            } else {
                targetSolar = new Date(curY, m - 1, d);
            }

            if (targetSolar < today) {
                if (isLunar) {
                    const l = Lunar.fromYmd(curY + 1, m, d);
                    const s = l.getSolar();
                    targetSolar = new Date(s.getYear(), s.getMonth() - 1, s.getDay());
                } else {
                    targetSolar = new Date(curY + 1, m - 1, d);
                }
            }

            const diff = Math.ceil((targetSolar - today) / 86400000);
            return {
                diff,
                masked: `OOOO-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`,
                display: `${targetSolar.getMonth() + 1}월 ${targetSolar.getDate()}일`
            };
        }

        // 4. 화면 렌더링
        function render() {
            const list = document.getElementById('birthdayList');
            const data = teamMembers.map(m => ({ ...m, info: getInfo(m.date, m.isLunar) }));
            data.sort((a, b) => a.info.diff - b.info.diff);

            list.innerHTML = data.map(m => `
                <div class="flex items-center justify-between p-4 rounded-2xl border-2 ${m.info.diff === 0 ? 'border-red-400 bg-red-50' : 'border-gray-100 bg-white'} shadow-sm transition-transform active:scale-95">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-gray-900">${m.name}</span>
                            <span class="text-[9px] px-2 py-0.5 rounded-full ${m.isLunar ? 'bg-indigo-100 text-indigo-600' : 'bg-gray-100 text-gray-500'}">
                                ${m.isLunar ? '음력' : '양력'}
                            </span>
                        </div>
                        <p class="text-[10px] text-gray-400 mt-1">생일: ${m.info.masked} / 올해: ${m.info.display}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-xl font-black ${m.info.diff === 0 ? 'text-red-500' : 'text-blue-600'}">
                            ${m.info.diff === 0 ? 'D-Day' : 'D-' + m.info.diff}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        render();
    </script>
</body>

</html>
